# WazuhBOTS — Required sysctl settings
#
# IMPORTANT: These settings must be applied on the PROXMOX HOST,
# not inside the LXC container. LXC containers share the host kernel
# and cannot modify sysctl values independently.
#
# Apply on the Proxmox host:
#   cp sysctl-wazuhbots.conf /etc/sysctl.d/99-wazuhbots.conf
#   sysctl --system
#
# Or temporarily:
#   sysctl -w vm.max_map_count=262144

# Required by OpenSearch (Wazuh Indexer) — minimum 262144
vm.max_map_count=262144
