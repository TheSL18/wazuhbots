<!--
  WazuhBOTS - Wazuh Manager Configuration (ossec.conf)
  Single-node deployment for Boss of the SOC style CTF training.
  Integrates with Wazuh Indexer via Filebeat and serves agents on port 1514/1515.
-->
<ossec_config>

  <!-- ========================== -->
  <!--       GLOBAL SETTINGS      -->
  <!-- ========================== -->
  <global>
    <jsonout_output>yes</jsonout_output>
    <alerts_log>yes</alerts_log>
    <logall>yes</logall>
    <logall_json>yes</logall_json>
    <email_notification>no</email_notification>
    <smtp_server>localhost</smtp_server>
    <email_from>wazuh@wazuhbots.local</email_from>
    <email_to>admin@wazuhbots.local</email_to>
    <email_maxperhour>12</email_maxperhour>
    <queue_size>131072</queue_size>
    <stats>8</stats>
    <memory_size>8192</memory_size>
    <white_list>127.0.0.1</white_list>
    <white_list>::1</white_list>
  </global>

  <!-- ========================== -->
  <!--    ALERTS CONFIGURATION    -->
  <!-- ========================== -->
  <alerts>
    <log_alert_level>3</log_alert_level>
    <email_alert_level>12</email_alert_level>
  </alerts>

  <!-- ========================== -->
  <!--     LOGGING / ARCHIVES     -->
  <!-- ========================== -->
  <logging>
    <log_format>plain,json</log_format>
  </logging>

  <!-- ========================== -->
  <!--   AUTH / AGENT ENROLLMENT  -->
  <!-- ========================== -->
  <auth>
    <disabled>no</disabled>
    <port>1515</port>
    <use_source_ip>no</use_source_ip>
    <purge>yes</purge>
    <use_password>yes</use_password>
    <ciphers>HIGH:!ADH:!EXP:!MD5:!RC4:!3DES:!CAMELLIA:@STRENGTH</ciphers>
    <ssl_verify_host>no</ssl_verify_host>
    <ssl_manager_cert>/var/ossec/etc/sslmanager.cert</ssl_manager_cert>
    <ssl_manager_key>/var/ossec/etc/sslmanager.key</ssl_manager_key>
    <ssl_auto_negotiate>no</ssl_auto_negotiate>
    <force>
      <enabled>yes</enabled>
      <disconnected_time enabled="yes">1h</disconnected_time>
      <after_registration_time>1h</after_registration_time>
      <key_mismatch>yes</key_mismatch>
    </force>
  </auth>

  <!-- ========================== -->
  <!--   REMOTE / AGENT COMMS     -->
  <!-- ========================== -->
  <remote>
    <connection>secure</connection>
    <port>1514</port>
    <protocol>tcp</protocol>
    <queue_size>131072</queue_size>
  </remote>

  <!-- ========================== -->
  <!--   CLUSTER (SINGLE NODE)    -->
  <!-- ========================== -->
  <cluster>
    <name>wazuhbots-cluster</name>
    <node_name>wazuh-manager</node_name>
    <node_type>master</node_type>
    <key>WazuhBOTSClusterKey2026</key>
    <port>1516</port>
    <bind_addr>0.0.0.0</bind_addr>
    <nodes>
      <node>wazuh-manager</node>
    </nodes>
    <hidden>no</hidden>
    <disabled>yes</disabled>
  </cluster>

  <!-- ========================== -->
  <!--   VULNERABILITY DETECTOR   -->
  <!-- ========================== -->
  <vulnerability-detector>
    <enabled>yes</enabled>
    <interval>5m</interval>
    <min_full_scan_interval>6h</min_full_scan_interval>
    <run_on_start>yes</run_on_start>

    <!-- NVD Feed -->
    <provider name="nvd">
      <enabled>yes</enabled>
      <update_interval>1h</update_interval>
    </provider>

    <!-- Canonical Ubuntu -->
    <provider name="canonical">
      <enabled>yes</enabled>
      <os>focal</os>
      <os>jammy</os>
      <update_interval>1h</update_interval>
    </provider>

    <!-- Debian -->
    <provider name="debian">
      <enabled>yes</enabled>
      <os>bullseye</os>
      <os>bookworm</os>
      <update_interval>1h</update_interval>
    </provider>

    <!-- Red Hat -->
    <provider name="redhat">
      <enabled>yes</enabled>
      <os>8</os>
      <os>9</os>
      <update_interval>1h</update_interval>
    </provider>

    <!-- Amazon Linux -->
    <provider name="alas">
      <enabled>yes</enabled>
      <os>amazon-linux-2</os>
      <update_interval>1h</update_interval>
    </provider>

    <!-- Microsoft (Windows) -->
    <provider name="msu">
      <enabled>yes</enabled>
      <update_interval>1h</update_interval>
    </provider>
  </vulnerability-detector>

  <!-- ========================== -->
  <!--     SYSCHECK (FIM)         -->
  <!-- ========================== -->
  <syscheck>
    <disabled>no</disabled>
    <frequency>300</frequency>
    <scan_on_start>yes</scan_on_start>
    <alert_new_files>yes</alert_new_files>
    <auto_ignore frequency="10" timeframe="3600">no</auto_ignore>

    <!-- Critical system directories -->
    <directories realtime="yes" check_all="yes" report_changes="yes">/etc,/usr/bin,/usr/sbin,/bin,/sbin</directories>
    <directories realtime="yes" check_all="yes" report_changes="yes">/boot</directories>

    <!-- Web application directories (detect web shells and defacement) -->
    <directories realtime="yes" check_all="yes" report_changes="yes">/var/www</directories>
    <directories realtime="yes" check_all="yes" report_changes="yes">/opt/webapp</directories>

    <!-- Cron and scheduled tasks -->
    <directories realtime="yes" check_all="yes" report_changes="yes">/var/spool/cron</directories>
    <directories realtime="yes" check_all="yes" report_changes="yes">/etc/cron.d</directories>

    <!-- SSH configuration -->
    <directories realtime="yes" check_all="yes" report_changes="yes">/root/.ssh</directories>

    <!-- Temp directories for suspicious drops -->
    <directories realtime="yes" check_all="yes">/tmp,/var/tmp,/dev/shm</directories>

    <!-- Ignore noise -->
    <ignore>/etc/mtab</ignore>
    <ignore>/etc/hosts.deny</ignore>
    <ignore>/etc/mail/statistics</ignore>
    <ignore>/etc/random-seed</ignore>
    <ignore>/etc/adjtime</ignore>
    <ignore>/etc/resolv.conf</ignore>
    <ignore type="sregex">.log$|.swp$</ignore>

    <!-- File size limit -->
    <file_limit>
      <enabled>yes</enabled>
      <entries>100000</entries>
    </file_limit>

    <!-- Registries for Windows agents -->
    <windows_registry arch="both">HKEY_LOCAL_MACHINE\Software</windows_registry>
    <windows_registry arch="both">HKEY_LOCAL_MACHINE\System\CurrentControlSet\Services</windows_registry>
    <windows_registry arch="both">HKEY_LOCAL_MACHINE\System\CurrentControlSet\Control</windows_registry>
    <windows_registry>HKEY_LOCAL_MACHINE\Software\Microsoft\Windows\CurrentVersion\Run</windows_registry>
    <windows_registry>HKEY_LOCAL_MACHINE\Software\Microsoft\Windows\CurrentVersion\RunOnce</windows_registry>

    <!-- Synchronization settings -->
    <synchronization>
      <enabled>yes</enabled>
      <interval>5m</interval>
      <max_interval>1h</max_interval>
      <max_eps>10</max_eps>
    </synchronization>

    <!-- Who-data audit (Linux) -->
    <whodata>
      <restart_audit>yes</restart_audit>
      <audit_key>fim-wazuhbots</audit_key>
      <startup_healthcheck>yes</startup_healthcheck>
    </whodata>
  </syscheck>

  <!-- ========================== -->
  <!--        ROOTCHECK           -->
  <!-- ========================== -->
  <rootcheck>
    <disabled>no</disabled>
    <check_files>yes</check_files>
    <check_trojans>yes</check_trojans>
    <check_dev>yes</check_dev>
    <check_sys>yes</check_sys>
    <check_pids>yes</check_pids>
    <check_ports>yes</check_ports>
    <check_if>yes</check_if>
    <frequency>36000</frequency>
    <rootkit_files>/var/ossec/etc/shared/rootkit_files.txt</rootkit_files>
    <rootkit_trojans>/var/ossec/etc/shared/rootkit_trojans.txt</rootkit_trojans>
    <skip_nfs>yes</skip_nfs>
  </rootcheck>

  <!-- ========================== -->
  <!--       OSQUERY              -->
  <!-- ========================== -->
  <wodle name="osquery">
    <disabled>yes</disabled>
    <run_daemon>no</run_daemon>
    <bin_path>/usr/bin/osqueryi</bin_path>
    <log_path>/var/log/osquery/osqueryd.results.log</log_path>
    <config_path>/etc/osquery/osquery.conf</config_path>
    <add_labels>yes</add_labels>
  </wodle>

  <!-- ========================== -->
  <!--    SYSCOLLECTOR            -->
  <!-- ========================== -->
  <wodle name="syscollector">
    <disabled>no</disabled>
    <interval>1h</interval>
    <scan_on_start>yes</scan_on_start>
    <hardware>yes</hardware>
    <os>yes</os>
    <network>yes</network>
    <packages>yes</packages>
    <ports all="no">yes</ports>
    <processes>yes</processes>
  </wodle>

  <!-- ========================== -->
  <!--     SCA (SECURITY CONFIG)  -->
  <!-- ========================== -->
  <wodle name="sca">
    <enabled>yes</enabled>
    <scan_on_start>yes</scan_on_start>
    <interval>12h</interval>
    <skip_nfs>yes</skip_nfs>
  </wodle>

  <!-- ========================== -->
  <!--     COMMAND MONITORING     -->
  <!-- ========================== -->
  <wodle name="command">
    <disabled>no</disabled>
    <tag>network-connections</tag>
    <command>/bin/ss -tulnp</command>
    <interval>5m</interval>
    <ignore_output>no</ignore_output>
    <run_on_start>yes</run_on_start>
    <timeout>30</timeout>
  </wodle>

  <wodle name="command">
    <disabled>no</disabled>
    <tag>open-files</tag>
    <command>/usr/bin/lsof -nPi 2>/dev/null | head -200</command>
    <interval>10m</interval>
    <ignore_output>no</ignore_output>
    <run_on_start>yes</run_on_start>
    <timeout>60</timeout>
  </wodle>

  <!-- ========================== -->
  <!--   LOG COLLECTION (LOCAL)   -->
  <!-- ========================== -->

  <!-- Wazuh internal logs -->
  <localfile>
    <log_format>syslog</log_format>
    <location>/var/ossec/logs/active-responses.log</location>
  </localfile>

  <!-- Linux system logs -->
  <localfile>
    <log_format>syslog</log_format>
    <location>/var/log/syslog</location>
  </localfile>

  <localfile>
    <log_format>syslog</log_format>
    <location>/var/log/auth.log</location>
  </localfile>

  <localfile>
    <log_format>syslog</log_format>
    <location>/var/log/dpkg.log</location>
  </localfile>

  <localfile>
    <log_format>syslog</log_format>
    <location>/var/log/kern.log</location>
  </localfile>

  <!-- Apache/Nginx access and error logs -->
  <localfile>
    <log_format>apache</log_format>
    <location>/var/log/apache2/access.log</location>
  </localfile>

  <localfile>
    <log_format>apache</log_format>
    <location>/var/log/apache2/error.log</location>
  </localfile>

  <localfile>
    <log_format>syslog</log_format>
    <location>/var/log/nginx/access.log</location>
  </localfile>

  <localfile>
    <log_format>syslog</log_format>
    <location>/var/log/nginx/error.log</location>
  </localfile>

  <!-- Audit log -->
  <localfile>
    <log_format>audit</log_format>
    <location>/var/log/audit/audit.log</location>
  </localfile>

  <!-- JSON-formatted application logs -->
  <localfile>
    <log_format>json</log_format>
    <location>/var/log/wazuhbots/app.log</location>
    <label key="app">wazuhbots</label>
  </localfile>

  <!-- ========================== -->
  <!--   LOG COLLECTION (AGENTS) -->
  <!-- ========================== -->

  <!-- Centralized configuration pushed to agents via shared agent.conf -->
  <!-- Windows event channels collected from agents -->
  <!-- Linux syslog, auth.log, apache logs from agents -->
  <!-- Agent-side configuration is managed via /var/ossec/etc/shared/default/agent.conf -->

  <!-- ========================== -->
  <!--  AGENT LOG COLLECTION      -->
  <!-- ========================== -->
  <!-- The manager collects from agents via remoted (port 1514).
       Agent-specific log sources are defined in the shared agent.conf
       or each agent's local ossec.conf. The settings below apply to
       the manager node itself. -->

  <!-- ========================== -->
  <!--   ACTIVE RESPONSE          -->
  <!-- ========================== -->

  <!-- Firewall drop (Linux) -->
  <command>
    <name>firewall-drop</name>
    <executable>firewall-drop</executable>
    <timeout_allowed>yes</timeout_allowed>
  </command>

  <active-response>
    <command>firewall-drop</command>
    <location>local</location>
    <rules_id>87901,87902,87903</rules_id>
    <timeout>600</timeout>
  </active-response>

  <!-- Host deny -->
  <command>
    <name>host-deny</name>
    <executable>host-deny</executable>
    <timeout_allowed>yes</timeout_allowed>
  </command>

  <active-response>
    <command>host-deny</command>
    <location>local</location>
    <level>10</level>
    <timeout>600</timeout>
  </active-response>

  <!-- Disable account (brute force response) -->
  <command>
    <name>disable-account</name>
    <executable>disable-account</executable>
    <timeout_allowed>yes</timeout_allowed>
  </command>

  <active-response>
    <command>disable-account</command>
    <location>local</location>
    <rules_id>87910</rules_id>
    <timeout>3600</timeout>
  </active-response>

  <!-- ========================== -->
  <!--   INTEGRATIONS             -->
  <!-- ========================== -->

  <!-- Slack integration (disabled by default, enable for CTF notifications) -->
  <!--
  <integration>
    <name>slack</name>
    <hook_url>https://hooks.slack.com/services/REPLACE/WITH/ACTUAL</hook_url>
    <level>10</level>
    <alert_format>json</alert_format>
  </integration>
  -->

  <!-- VirusTotal integration (disabled, requires API key) -->
  <!--
  <integration>
    <name>virustotal</name>
    <api_key>REPLACE_WITH_VT_API_KEY</api_key>
    <rule_id>550,553,554</rule_id>
    <alert_format>json</alert_format>
  </integration>
  -->

  <!-- ========================== -->
  <!--   CUSTOM RULES INCLUDE     -->
  <!-- ========================== -->
  <ruleset>
    <decoder_dir>ruleset/decoders</decoder_dir>
    <rule_dir>ruleset/rules</rule_dir>
    <rule_exclude>0215-policy_rules.xml</rule_exclude>
    <list>etc/lists/audit-keys</list>
    <list>etc/lists/amazon/aws-eventnames</list>
    <list>etc/lists/security-eventchannel</list>

    <!-- WazuhBOTS custom rules and decoders -->
    <decoder_dir>etc/decoders</decoder_dir>
    <rule_dir>etc/rules</rule_dir>
  </ruleset>

  <!-- ========================== -->
  <!--  FILEBEAT / INDEXER OUTPUT -->
  <!-- ========================== -->
  <!-- Wazuh Manager writes alerts to /var/ossec/logs/alerts/alerts.json
       Filebeat (running as a sidecar or on the same container) reads
       this file and ships events to the Wazuh Indexer.

       Filebeat configuration is at /etc/filebeat/filebeat.yml and
       points to:
         output.elasticsearch:
           hosts: ["wazuh-indexer:9200"]
           index: "wazuh-alerts-4.x-*"

       No additional ossec.conf stanza is needed for Filebeat;
       Filebeat operates independently. -->

</ossec_config>
