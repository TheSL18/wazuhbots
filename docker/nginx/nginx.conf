# ==============================================================
# WazuhBOTS - Nginx Reverse Proxy Configuration
# ==============================================================
# Routes:
#   /ctf/*        -> CTFd (port 8000)
#   /dashboard/*  -> Wazuh Dashboard (port 5601)
#
# Features:
#   - Rate limiting for brute force protection
#   - WebSocket support for CTFd
#   - SSL placeholder (self-signed or Let's Encrypt)
#   - Custom error pages
#   - Proper proxy headers
# ==============================================================

# Worker configuration
worker_processes auto;
pid /run/nginx.pid;
error_log /var/log/nginx/error.log warn;

events {
    worker_connections 1024;
    multi_accept on;
}

http {
    # --------------------------------------------------------
    # Basic settings
    # --------------------------------------------------------
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile    on;
    tcp_nopush  on;
    tcp_nodelay on;

    keepalive_timeout  65;
    types_hash_max_size 2048;
    client_max_body_size 100M;

    # --------------------------------------------------------
    # Logging
    # --------------------------------------------------------
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'rt=$request_time urt=$upstream_response_time';

    access_log /var/log/nginx/access.log main;

    # --------------------------------------------------------
    # Gzip compression
    # --------------------------------------------------------
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript
               image/svg+xml;

    # --------------------------------------------------------
    # Rate Limiting Zones
    # --------------------------------------------------------

    # General rate limit: 10 requests/second per IP
    limit_req_zone $binary_remote_addr zone=general:10m rate=10r/s;

    # Login / auth endpoints: 5 requests/second per IP (brute force protection)
    limit_req_zone $binary_remote_addr zone=login:10m rate=5r/s;

    # API rate limit: 20 requests/second per IP
    limit_req_zone $binary_remote_addr zone=api:10m rate=20r/s;

    # Strict limit for sensitive operations: 2 requests/second
    limit_req_zone $binary_remote_addr zone=strict:10m rate=2r/s;

    # Connection limit per IP
    limit_conn_zone $binary_remote_addr zone=connlimit:10m;

    # Rate limit response code (429 Too Many Requests)
    limit_req_status 429;
    limit_conn_status 429;

    # --------------------------------------------------------
    # Upstream definitions
    # --------------------------------------------------------
    upstream ctfd_backend {
        server ctfd:8000;
        keepalive 32;
    }

    upstream wazuh_dashboard_backend {
        server wazuh-dashboard:5601;
        keepalive 16;
    }

    # --------------------------------------------------------
    # Custom error pages (shared)
    # --------------------------------------------------------
    # Place custom error HTML files in /etc/nginx/html/
    # e.g., /etc/nginx/html/404.html, /etc/nginx/html/50x.html

    # --------------------------------------------------------
    # HTTP -> HTTPS redirect (uncomment when SSL is configured)
    # --------------------------------------------------------
    # server {
    #     listen 80;
    #     server_name _;
    #     return 301 https://$host$request_uri;
    # }

    # --------------------------------------------------------
    # Main server block (HTTP - default during development)
    # --------------------------------------------------------
    server {
        listen 80 default_server;
        server_name _;

        # Security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Content-Security-Policy "default-src 'self' 'unsafe-inline' 'unsafe-eval'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self' wss: ws:;" always;

        # Connection limit
        limit_conn connlimit 50;

        # Custom error pages
        error_page 404 /custom_404.html;
        error_page 500 502 503 504 /custom_50x.html;

        location = /custom_404.html {
            root /etc/nginx/html;
            internal;
        }

        location = /custom_50x.html {
            root /etc/nginx/html;
            internal;
        }

        # Rate limit error page
        error_page 429 /custom_429.html;
        location = /custom_429.html {
            root /etc/nginx/html;
            internal;
        }

        # --------------------------------------------------
        # Root: redirect to CTFd
        # --------------------------------------------------
        location = / {
            return 302 /ctf/;
        }

        # --------------------------------------------------
        # CTFd - Challenge Platform
        # --------------------------------------------------
        location /ctf/ {
            limit_req zone=general burst=20 nodelay;

            proxy_pass http://ctfd_backend/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Script-Name /ctf;

            # Timeouts
            proxy_connect_timeout 60s;
            proxy_send_timeout    60s;
            proxy_read_timeout    60s;

            # Buffering
            proxy_buffering on;
            proxy_buffer_size 4k;
            proxy_buffers 8 16k;
        }

        # CTFd login - stricter rate limiting for brute force protection
        location /ctf/login {
            limit_req zone=login burst=3 nodelay;

            proxy_pass http://ctfd_backend/login;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Script-Name /ctf;
        }

        # CTFd API endpoints
        location /ctf/api/ {
            limit_req zone=api burst=10 nodelay;

            proxy_pass http://ctfd_backend/api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Script-Name /ctf;

            # JSON responses
            proxy_set_header Accept application/json;
        }

        # CTFd WebSocket support (for live scoring, notifications)
        location /ctf/socket.io/ {
            proxy_pass http://ctfd_backend/socket.io/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # WebSocket headers
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";

            # WebSocket timeouts (longer for persistent connections)
            proxy_connect_timeout 7d;
            proxy_send_timeout    7d;
            proxy_read_timeout    7d;
        }

        # CTFd events stream (Server-Sent Events)
        location /ctf/events {
            proxy_pass http://ctfd_backend/events;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # SSE settings
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_buffering off;
            proxy_cache off;
            chunked_transfer_encoding off;
        }

        # CTFd static files (themes, uploads)
        location /ctf/themes/ {
            proxy_pass http://ctfd_backend/themes/;
            proxy_set_header Host $host;

            # Cache static assets
            proxy_cache_valid 200 1h;
            expires 1h;
            add_header Cache-Control "public, immutable";
        }

        location /ctf/files/ {
            proxy_pass http://ctfd_backend/files/;
            proxy_set_header Host $host;

            proxy_cache_valid 200 30m;
            expires 30m;
        }

        # --------------------------------------------------
        # Wazuh Dashboard
        # --------------------------------------------------
        location /dashboard/ {
            limit_req zone=general burst=20 nodelay;

            proxy_pass https://wazuh_dashboard_backend/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Wazuh Dashboard uses its own TLS
            proxy_ssl_verify off;

            # Timeouts (dashboard queries can be slow)
            proxy_connect_timeout 120s;
            proxy_send_timeout    120s;
            proxy_read_timeout    120s;

            # Buffering for large dashboard responses
            proxy_buffering on;
            proxy_buffer_size 8k;
            proxy_buffers 16 32k;

            # Required for proper sub-path operation
            proxy_redirect / /dashboard/;
            sub_filter_once off;
            sub_filter_types application/javascript text/css;
        }

        # Wazuh Dashboard login - stricter rate limiting
        location /dashboard/auth/login {
            limit_req zone=strict burst=2 nodelay;

            proxy_pass https://wazuh_dashboard_backend/auth/login;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_ssl_verify off;
        }

        # Wazuh Dashboard API
        location /dashboard/api/ {
            limit_req zone=api burst=10 nodelay;

            proxy_pass https://wazuh_dashboard_backend/api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_ssl_verify off;
        }

        # --------------------------------------------------
        # Health check endpoint
        # --------------------------------------------------
        location /health {
            access_log off;
            return 200 '{"status":"ok","service":"wazuhbots-proxy"}';
            add_header Content-Type application/json;
        }

        # --------------------------------------------------
        # Deny access to hidden files
        # --------------------------------------------------
        location ~ /\. {
            deny all;
            access_log off;
            log_not_found off;
        }

        # --------------------------------------------------
        # Favicon
        # --------------------------------------------------
        location = /favicon.ico {
            access_log off;
            log_not_found off;
            return 204;
        }
    }

    # --------------------------------------------------------
    # SSL Server Block (uncomment and configure for production)
    # --------------------------------------------------------
    # server {
    #     listen 443 ssl http2;
    #     server_name wazuhbots.local;
    #
    #     # SSL certificate paths
    #     # Option 1: Self-signed (development)
    #     ssl_certificate     /etc/nginx/certs/wazuhbots.crt;
    #     ssl_certificate_key /etc/nginx/certs/wazuhbots.key;
    #
    #     # Option 2: Let's Encrypt (production)
    #     # ssl_certificate     /etc/letsencrypt/live/wazuhbots.example.com/fullchain.pem;
    #     # ssl_certificate_key /etc/letsencrypt/live/wazuhbots.example.com/privkey.pem;
    #
    #     # SSL hardening
    #     ssl_protocols TLSv1.2 TLSv1.3;
    #     ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384';
    #     ssl_prefer_server_ciphers on;
    #     ssl_session_cache shared:SSL:10m;
    #     ssl_session_timeout 1d;
    #     ssl_session_tickets off;
    #
    #     # HSTS
    #     add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    #
    #     # OCSP stapling
    #     ssl_stapling on;
    #     ssl_stapling_verify on;
    #     resolver 8.8.8.8 8.8.4.4 valid=300s;
    #
    #     # ... (copy all location blocks from the HTTP server above)
    # }
}
