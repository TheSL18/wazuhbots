<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 80" fill="none">
  <defs>
    <linearGradient id="s1g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ef4444"/>
      <stop offset="100%" stop-color="#f97316"/>
    </linearGradient>
  </defs>
  <rect width="280" height="80" rx="12" fill="#0a0e17" stroke="#ef4444" stroke-width="1.5" stroke-opacity="0.4"/>
  <!-- Scenario icon: web/spider -->
  <g transform="translate(40,40)">
    <circle r="22" fill="#ef4444" opacity="0.12"/>
    <circle r="16" fill="none" stroke="#ef4444" stroke-width="1.5" opacity="0.4"/>
    <!-- Spider web lines -->
    <line x1="0" y1="-14" x2="0" y2="14" stroke="#ef4444" stroke-width="1" opacity="0.6"/>
    <line x1="-14" y1="0" x2="14" y2="0" stroke="#ef4444" stroke-width="1" opacity="0.6"/>
    <line x1="-10" y1="-10" x2="10" y2="10" stroke="#ef4444" stroke-width="1" opacity="0.6"/>
    <line x1="10" y1="-10" x2="-10" y2="10" stroke="#ef4444" stroke-width="1" opacity="0.6"/>
    <!-- Web rings -->
    <circle r="6" fill="none" stroke="#ef4444" stroke-width="0.8" opacity="0.5"/>
    <circle r="11" fill="none" stroke="#ef4444" stroke-width="0.6" opacity="0.3"/>
    <circle cx="0" cy="0" r="2" fill="#ef4444"/>
  </g>
  <!-- Text -->
  <text x="76" y="30" font-family="'Segoe UI',system-ui,sans-serif" font-size="11"
        font-weight="700" letter-spacing="2" fill="#ef4444" opacity="0.8">SCENARIO 1</text>
  <text x="76" y="52" font-family="'Segoe UI',system-ui,sans-serif" font-size="20"
        font-weight="800" fill="#e2e8f0">Dark Harvest</text>
  <text x="76" y="68" font-family="'SF Mono',monospace" font-size="10" fill="#94a3b8">Web Application Attack</text>
  <!-- Tag -->
  <g transform="translate(232,12)">
    <rect width="36" height="18" rx="9" fill="#ef4444" opacity="0.15" stroke="#ef4444" stroke-width="0.8" stroke-opacity="0.3"/>
    <text x="18" y="12.5" text-anchor="middle" font-family="monospace" font-size="9" font-weight="700" fill="#ef4444">S1</text>
  </g>
</svg>
