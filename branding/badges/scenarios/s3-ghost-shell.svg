<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 80" fill="none">
  <defs>
    <linearGradient id="s3g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#10b981"/>
    </linearGradient>
  </defs>
  <rect width="280" height="80" rx="12" fill="#0a0e17" stroke="#22c55e" stroke-width="1.5" stroke-opacity="0.4"/>
  <!-- Scenario icon: terminal/ghost -->
  <g transform="translate(40,40)">
    <circle r="22" fill="#22c55e" opacity="0.12"/>
    <!-- Terminal window -->
    <rect x="-15" y="-12" width="30" height="22" rx="3" fill="none" stroke="#22c55e" stroke-width="1.5" opacity="0.7"/>
    <!-- Title bar dots -->
    <circle cx="-10" cy="-8" r="1.5" fill="#ef4444" opacity="0.6"/>
    <circle cx="-5" cy="-8" r="1.5" fill="#f59e0b" opacity="0.6"/>
    <circle cx="0" cy="-8" r="1.5" fill="#22c55e" opacity="0.6"/>
    <!-- Terminal prompt -->
    <text x="-10" y="1" font-family="monospace" font-size="7" fill="#22c55e" opacity="0.9">$_</text>
    <rect x="-3" y="-3" width="12" height="1.5" rx="0.5" fill="#22c55e" opacity="0.4"/>
    <rect x="-10" y="3" width="16" height="1.5" rx="0.5" fill="#22c55e" opacity="0.3"/>
  </g>
  <text x="76" y="30" font-family="'Segoe UI',system-ui,sans-serif" font-size="11"
        font-weight="700" letter-spacing="2" fill="#22c55e" opacity="0.8">SCENARIO 3</text>
  <text x="76" y="52" font-family="'Segoe UI',system-ui,sans-serif" font-size="20"
        font-weight="800" fill="#e2e8f0">Ghost Shell</text>
  <text x="76" y="68" font-family="'SF Mono',monospace" font-size="10" fill="#94a3b8">Linux Server Intrusion</text>
  <g transform="translate(232,12)">
    <rect width="36" height="18" rx="9" fill="#22c55e" opacity="0.15" stroke="#22c55e" stroke-width="0.8" stroke-opacity="0.3"/>
    <text x="18" y="12.5" text-anchor="middle" font-family="monospace" font-size="9" font-weight="700" fill="#22c55e">S3</text>
  </g>
</svg>
