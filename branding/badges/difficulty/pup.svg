<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 160" fill="none">
  <defs>
    <linearGradient id="pg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#16a34a"/>
    </linearGradient>
    <filter id="gl"><feGaussianBlur stdDeviation="2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <circle cx="80" cy="80" r="76" fill="#0a0e17" stroke="#22c55e" stroke-width="2" stroke-opacity="0.4"/>
  <circle cx="80" cy="80" r="68" fill="none" stroke="#22c55e" stroke-width="0.5" stroke-opacity="0.2" stroke-dasharray="4,4"/>

  <!-- Small cute wolf pup - simplified -->
  <g transform="translate(80,65)" filter="url(#gl)">
    <!-- Ears (floppy, puppy-like) -->
    <ellipse cx="-18" cy="-12" rx="10" ry="14" transform="rotate(-15,-18,-12)" fill="url(#pg)" opacity="0.7"/>
    <ellipse cx="18" cy="-12" rx="10" ry="14" transform="rotate(15,18,-12)" fill="url(#pg)" opacity="0.7"/>
    <!-- Head -->
    <circle cx="0" cy="0" r="20" fill="url(#pg)" opacity="0.6"/>
    <!-- Face patch -->
    <ellipse cx="0" cy="5" rx="14" ry="12" fill="url(#pg)" opacity="0.45"/>
    <!-- Eyes (big, cute) -->
    <circle cx="-8" cy="-3" r="5" fill="#06b6d4"/>
    <circle cx="8" cy="-3" r="5" fill="#06b6d4"/>
    <circle cx="-8" cy="-3" r="3" fill="#0a0e17"/>
    <circle cx="8" cy="-3" r="3" fill="#0a0e17"/>
    <circle cx="-7" cy="-4.5" r="1.5" fill="#fff" opacity="0.9"/>
    <circle cx="9" cy="-4.5" r="1.5" fill="#fff" opacity="0.9"/>
    <!-- Nose -->
    <ellipse cx="0" cy="6" rx="3" ry="2" fill="#0a0e17" opacity="0.5"/>
    <!-- Mouth -->
    <path d="M-3,9 Q0,12 3,9" fill="none" stroke="#0a0e17" stroke-width="1" opacity="0.3"/>
  </g>

  <!-- Text -->
  <text x="80" y="115" text-anchor="middle" font-family="'Segoe UI',system-ui,sans-serif"
        font-size="18" font-weight="800" fill="#22c55e">PUP</text>
  <text x="80" y="132" text-anchor="middle" font-family="'SF Mono',monospace"
        font-size="11" fill="#94a3b8">100 pts</text>

  <!-- Star rating: 1/4 -->
  <g transform="translate(56,140)" fill="#22c55e">
    <polygon points="8,0 10,5 16,5 11,8 13,14 8,10 3,14 5,8 0,5 6,5" transform="scale(0.7)"/>
    <polygon points="8,0 10,5 16,5 11,8 13,14 8,10 3,14 5,8 0,5 6,5" transform="translate(14,0) scale(0.7)" opacity="0.2"/>
    <polygon points="8,0 10,5 16,5 11,8 13,14 8,10 3,14 5,8 0,5 6,5" transform="translate(28,0) scale(0.7)" opacity="0.2"/>
    <polygon points="8,0 10,5 16,5 11,8 13,14 8,10 3,14 5,8 0,5 6,5" transform="translate(42,0) scale(0.7)" opacity="0.2"/>
  </g>
</svg>
