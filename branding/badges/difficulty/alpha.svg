<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 160" fill="none">
  <defs>
    <linearGradient id="ag" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <filter id="gl"><feGaussianBlur stdDeviation="2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <circle cx="80" cy="80" r="76" fill="#0a0e17" stroke="#f59e0b" stroke-width="2" stroke-opacity="0.4"/>
  <circle cx="80" cy="80" r="68" fill="none" stroke="#f59e0b" stroke-width="0.5" stroke-opacity="0.2" stroke-dasharray="4,4"/>

  <!-- Alpha wolf - strong, commanding -->
  <g transform="translate(80,58)" filter="url(#gl)">
    <!-- Ears (tall, proud) -->
    <polygon points="-24,-8 -16,-36 -6,-6" fill="url(#ag)" opacity="0.9"/>
    <polygon points="24,-8 16,-36 6,-6" fill="url(#ag)" opacity="0.9"/>
    <!-- Head (broader) -->
    <ellipse cx="0" cy="0" rx="24" ry="18" fill="url(#ag)" opacity="0.65"/>
    <!-- Brow ridge -->
    <path d="M-20,-6 L-8,-10 L0,-8 L8,-10 L20,-6" fill="none" stroke="url(#ag)" stroke-width="2" opacity="0.5"/>
    <!-- Snout -->
    <ellipse cx="0" cy="10" rx="13" ry="11" fill="url(#ag)" opacity="0.5"/>
    <ellipse cx="0" cy="20" rx="7" ry="5" fill="url(#ag)" opacity="0.4"/>
    <!-- Eyes (intense, narrowed) -->
    <polygon points="-16,-4 -6,-7 -5,0 -16,1" fill="#06b6d4"/>
    <polygon points="16,-4 6,-7 5,0 16,1" fill="#06b6d4"/>
    <circle cx="-10" cy="-3" r="2.5" fill="#0a0e17"/>
    <circle cx="10" cy="-3" r="2.5" fill="#0a0e17"/>
    <circle cx="-9" cy="-4" r="1" fill="#f59e0b" opacity="0.8"/>
    <circle cx="11" cy="-4" r="1" fill="#f59e0b" opacity="0.8"/>
    <!-- Scar across eye -->
    <line x1="-15" y1="-8" x2="-6" y2="2" stroke="#f59e0b" stroke-width="1" opacity="0.4"/>
    <!-- Nose -->
    <ellipse cx="0" cy="16" rx="4" ry="3" fill="#0a0e17" opacity="0.5"/>
    <!-- Teeth hint -->
    <line x1="-4" y1="23" x2="-3" y2="26" stroke="#e2e8f0" stroke-width="1" opacity="0.3"/>
    <line x1="4" y1="23" x2="3" y2="26" stroke="#e2e8f0" stroke-width="1" opacity="0.3"/>
  </g>

  <text x="80" y="117" text-anchor="middle" font-family="'Segoe UI',system-ui,sans-serif"
        font-size="18" font-weight="800" fill="#f59e0b">ALPHA</text>
  <text x="80" y="133" text-anchor="middle" font-family="'SF Mono',monospace"
        font-size="11" fill="#94a3b8">300 pts</text>

  <!-- Star rating: 3/4 -->
  <g transform="translate(56,140)" fill="#f59e0b">
    <polygon points="8,0 10,5 16,5 11,8 13,14 8,10 3,14 5,8 0,5 6,5" transform="scale(0.7)"/>
    <polygon points="8,0 10,5 16,5 11,8 13,14 8,10 3,14 5,8 0,5 6,5" transform="translate(14,0) scale(0.7)"/>
    <polygon points="8,0 10,5 16,5 11,8 13,14 8,10 3,14 5,8 0,5 6,5" transform="translate(28,0) scale(0.7)"/>
    <polygon points="8,0 10,5 16,5 11,8 13,14 8,10 3,14 5,8 0,5 6,5" transform="translate(42,0) scale(0.7)" opacity="0.2"/>
  </g>
</svg>
