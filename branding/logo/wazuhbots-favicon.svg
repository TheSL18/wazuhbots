<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
  </defs>
  <rect width="64" height="64" rx="14" fill="#0a0e17"/>
  <!-- Simplified wolf -->
  <g transform="translate(32,30) scale(0.32)">
    <!-- Ears -->
    <polygon points="-60,-55 -35,-90 -20,-40" fill="url(#g)" opacity="0.9"/>
    <polygon points="60,-55 35,-90 20,-40" fill="url(#g)" opacity="0.9"/>
    <!-- Head -->
    <polygon points="-35,-55 0,-68 35,-55 30,-28 0,-38 -30,-28" fill="url(#g)" opacity="0.85"/>
    <!-- Face -->
    <polygon points="-30,-28 0,-38 -8,0 -50,-2 -55,-30" fill="url(#g)" opacity="0.75"/>
    <polygon points="30,-28 0,-38 8,0 50,-2 55,-30" fill="url(#g)" opacity="0.75"/>
    <!-- Snout -->
    <polygon points="-50,-2 -8,0 -18,35 -42,28" fill="url(#g)" opacity="0.65"/>
    <polygon points="50,-2 8,0 18,35 42,28" fill="url(#g)" opacity="0.65"/>
    <!-- Jaw -->
    <polygon points="-42,28 -18,35 0,58 18,35 42,28 0,80" fill="url(#g)" opacity="0.5"/>
    <!-- Eyes -->
    <polygon points="-45,-22 -22,-28 -24,-12 -47,-10" fill="#06b6d4"/>
    <polygon points="45,-22 22,-28 24,-12 47,-10" fill="#06b6d4"/>
    <circle cx="-34" cy="-18" r="5" fill="#0a0e17"/>
    <circle cx="34" cy="-18" r="5" fill="#0a0e17"/>
    <circle cx="-32" cy="-20" r="2.2" fill="#fff" opacity="0.8"/>
    <circle cx="36" cy="-20" r="2.2" fill="#fff" opacity="0.8"/>
  </g>
</svg>
