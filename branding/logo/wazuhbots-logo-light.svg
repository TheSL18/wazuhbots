<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 240" fill="none">
  <defs>
    <linearGradient id="wolfGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#0891b2"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="50%" stop-color="#0891b2"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#2563eb" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#0891b2" stop-opacity="0.05"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Shield -->
  <path d="M120,12 L208,42 L208,140 L120,210 L32,140 L32,42 Z"
        fill="url(#shieldGrad)" stroke="url(#wolfGrad)" stroke-width="2.5" opacity="0.5"/>

  <!-- Wolf Head -->
  <g filter="url(#glow)">
    <polygon points="72,55 92,32 102,70" fill="url(#wolfGrad)" opacity="0.9"/>
    <polygon points="168,55 148,32 138,70" fill="url(#wolfGrad)" opacity="0.9"/>
    <polygon points="92,50 120,38 148,50 145,75 120,65 95,75" fill="url(#wolfGrad)" opacity="0.85"/>
    <polygon points="95,75 120,65 115,100 80,105 72,80" fill="url(#wolfGrad)" opacity="0.75"/>
    <polygon points="145,75 120,65 125,100 160,105 168,80" fill="url(#wolfGrad)" opacity="0.75"/>
    <polygon points="80,105 115,100 108,135 88,130" fill="url(#wolfGrad)" opacity="0.65"/>
    <polygon points="160,105 125,100 132,135 152,130" fill="url(#wolfGrad)" opacity="0.65"/>
    <polygon points="88,130 108,135 120,155 132,135 152,130 120,170" fill="url(#wolfGrad)" opacity="0.55"/>
  </g>

  <!-- Eyes -->
  <g>
    <polygon points="88,82 105,78 103,92 86,94" fill="#0891b2"/>
    <polygon points="152,82 135,78 137,92 154,94" fill="#0891b2"/>
  </g>
  <circle cx="96" cy="86" r="3" fill="#ffffff"/>
  <circle cx="144" cy="86" r="3" fill="#ffffff"/>
  <circle cx="98" cy="84" r="1.2" fill="#0891b2" opacity="0.6"/>
  <circle cx="146" cy="84" r="1.2" fill="#0891b2" opacity="0.6"/>

  <polygon points="115,120 125,120 120,128" fill="#ffffff" opacity="0.4"/>

  <!-- Text -->
  <text x="270" y="115" font-family="'Segoe UI','SF Pro Display',system-ui,sans-serif"
        font-size="72" font-weight="800" letter-spacing="-1" fill="url(#textGrad)">
    Wazuh<tspan fill="#1e293b" font-weight="900">BOTS</tspan>
  </text>

  <text x="272" y="148" font-family="'Segoe UI',system-ui,sans-serif"
        font-size="18" font-weight="600" letter-spacing="6" fill="#64748b">
    BOSS OF THE SOC
  </text>

  <rect x="272" y="158" width="200" height="2" rx="1" fill="url(#wolfGrad)" opacity="0.4"/>

  <g transform="translate(580,130)">
    <rect x="0" y="0" width="56" height="22" rx="11" fill="#2563eb" opacity="0.1"
          stroke="#2563eb" stroke-width="1" stroke-opacity="0.3"/>
    <text x="28" y="15" text-anchor="middle" font-family="'SF Mono','Cascadia Code',monospace"
          font-size="11" font-weight="600" fill="#2563eb">v1.0</text>
  </g>
</svg>
