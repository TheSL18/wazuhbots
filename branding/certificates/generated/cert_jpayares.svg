<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 780" fill="none">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0e17"/>
      <stop offset="100%" stop-color="#0f1629"/>
    </linearGradient>
    <linearGradient id="wolfGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="50%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="grid" width="30" height="30" patternUnits="userSpaceOnUse">
      <path d="M 30 0 L 0 0 0 30" fill="none" stroke="#1e293b" stroke-width="0.3" opacity="0.2"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1100" height="780" rx="8" fill="url(#bgGrad)"/>
  <rect width="1100" height="780" rx="8" fill="url(#grid)"/>

  <!-- Decorative borders -->
  <rect x="20" y="20" width="1060" height="740" rx="4" fill="none" stroke="url(#wolfGrad)" stroke-width="1.5" opacity="0.3"/>
  <rect x="30" y="30" width="1040" height="720" rx="4" fill="none" stroke="url(#goldGrad)" stroke-width="0.8" opacity="0.2"/>

  <!-- Top accent -->
  <rect x="20" y="20" width="1060" height="4" rx="2" fill="url(#wolfGrad)" opacity="0.5"/>

  <!-- Corner ornaments -->
  <g stroke="url(#goldGrad)" stroke-width="1.5" fill="none" opacity="0.25">
    <!-- Top left -->
    <path d="M50,50 L50,80 M50,50 L80,50"/>
    <circle cx="50" cy="50" r="4" fill="url(#goldGrad)" opacity="0.3"/>
    <!-- Top right -->
    <path d="M1050,50 L1050,80 M1050,50 L1020,50"/>
    <circle cx="1050" cy="50" r="4" fill="url(#goldGrad)" opacity="0.3"/>
    <!-- Bottom left -->
    <path d="M50,730 L50,700 M50,730 L80,730"/>
    <circle cx="50" cy="730" r="4" fill="url(#goldGrad)" opacity="0.3"/>
    <!-- Bottom right -->
    <path d="M1050,730 L1050,700 M1050,730 L1020,730"/>
    <circle cx="1050" cy="730" r="4" fill="url(#goldGrad)" opacity="0.3"/>
  </g>

  <!-- Wolf watermark (background) -->
  <g transform="translate(550,400) scale(3.5)" opacity="0.03" filter="url(#glow)">
    <polygon points="-38,-35 -22,-55 -14,-25" fill="#3b82f6"/>
    <polygon points="38,-35 22,-55 14,-25" fill="#3b82f6"/>
    <polygon points="-22,-35 0,-45 22,-35 18,-15 0,-22 -18,-15" fill="#3b82f6"/>
    <polygon points="-18,-15 0,-22 -5,8 -35,10 -40,-12" fill="#3b82f6"/>
    <polygon points="18,-15 0,-22 5,8 35,10 40,-12" fill="#3b82f6"/>
    <polygon points="-35,10 -5,8 -10,30 -28,26" fill="#3b82f6"/>
    <polygon points="35,10 5,8 10,30 28,26" fill="#3b82f6"/>
    <polygon points="-28,26 -10,30 0,48 10,30 28,26 0,62" fill="#3b82f6"/>
  </g>

  <!-- Small wolf icon top center -->
  <g transform="translate(550,95) scale(0.6)" filter="url(#glow)">
    <polygon points="-38,-35 -22,-55 -14,-25" fill="url(#wolfGrad)" opacity="0.85"/>
    <polygon points="38,-35 22,-55 14,-25" fill="url(#wolfGrad)" opacity="0.85"/>
    <polygon points="-22,-35 0,-45 22,-35 18,-15 0,-22 -18,-15" fill="url(#wolfGrad)" opacity="0.8"/>
    <polygon points="-18,-15 0,-22 -5,8 -35,10 -40,-12" fill="url(#wolfGrad)" opacity="0.7"/>
    <polygon points="18,-15 0,-22 5,8 35,10 40,-12" fill="url(#wolfGrad)" opacity="0.7"/>
    <polygon points="-35,10 -5,8 -10,30 -28,26" fill="url(#wolfGrad)" opacity="0.6"/>
    <polygon points="35,10 5,8 10,30 28,26" fill="url(#wolfGrad)" opacity="0.6"/>
    <polygon points="-28,26 -10,30 0,48 10,30 28,26 0,62" fill="url(#wolfGrad)" opacity="0.45"/>
    <polygon points="-30,-10 -18,-14 -17,-4 -30,-2" fill="#06b6d4"/>
    <polygon points="30,-10 18,-14 17,-4 30,-2" fill="#06b6d4"/>
  </g>

  <!-- Header -->
  <text x="550" y="170" text-anchor="middle" font-family="'Segoe UI',system-ui,sans-serif"
        font-size="14" font-weight="700" letter-spacing="6" fill="#3b82f6" opacity="0.7">
    WAZUHBOTS — BOSS OF THE SOC
  </text>

  <!-- Certificate title -->
  <text x="550" y="230" text-anchor="middle" font-family="'Georgia','Times New Roman',serif"
        font-size="48" font-weight="400" fill="url(#goldGrad)" letter-spacing="4">
    Certificate of Achievement
  </text>

  <rect x="350" y="248" width="400" height="1.5" rx="0.75" fill="url(#goldGrad)" opacity="0.3"/>

  <!-- "This certifies that" -->
  <text x="550" y="300" text-anchor="middle" font-family="'Segoe UI',system-ui,sans-serif"
        font-size="16" fill="#94a3b8" letter-spacing="1">
    This certifies that
  </text>

  <!-- Participant name placeholder -->
  <text x="550" y="365" text-anchor="middle" font-family="'Georgia','Times New Roman',serif"
        font-size="42" font-weight="400" fill="#e2e8f0" letter-spacing="2">
    jpayares
  </text>
  <rect x="250" y="380" width="600" height="1" fill="#3b82f6" opacity="0.2"/>

  <!-- Achievement text -->
  <text x="550" y="430" text-anchor="middle" font-family="'Segoe UI',system-ui,sans-serif"
        font-size="16" fill="#94a3b8">
    has successfully completed the WazuhBOTS CTF challenge
  </text>

  <!-- Achievement level -->
  <text x="550" y="475" text-anchor="middle" font-family="'Segoe UI',system-ui,sans-serif"
        font-size="28" font-weight="700" fill="url(#wolfGrad)" letter-spacing="2">
    Pup — Junior Analyst
  </text>

  <!-- Score -->
  <text x="550" y="515" text-anchor="middle" font-family="'SF Mono',monospace"
        font-size="14" fill="#64748b">
    Score: 1,550 / 39,200 pts  |  Rank: #1  |  Challenges: 14 / 150
  </text>

  <!-- Date and signature area -->
  <g transform="translate(0,580)">
    <!-- Left: Date -->
    <g transform="translate(250,0)">
      <text x="0" y="50" font-family="'Georgia',serif" font-size="16" fill="#e2e8f0" text-anchor="middle">
        March 02, 2026
      </text>
      <rect x="-80" y="58" width="160" height="1" fill="#3b82f6" opacity="0.2"/>
      <text x="0" y="78" font-family="'Segoe UI',sans-serif" font-size="11" fill="#64748b"
            text-anchor="middle" letter-spacing="2">DATE</text>
    </g>

    <!-- Center: Seal -->
    <g transform="translate(550,40)">
      <circle r="35" fill="#0a0e17" stroke="url(#goldGrad)" stroke-width="2" opacity="0.5"/>
      <circle r="28" fill="none" stroke="url(#goldGrad)" stroke-width="0.5" opacity="0.3"/>
      <text y="4" text-anchor="middle" font-family="'SF Mono',monospace" font-size="9"
            font-weight="700" fill="url(#goldGrad)" letter-spacing="1">BOTS</text>
      <text y="16" text-anchor="middle" font-family="'SF Mono',monospace" font-size="7"
            fill="#94a3b8">VERIFIED</text>
    </g>

    <!-- Right: Organizer -->
    <g transform="translate(850,0)">
      <text x="0" y="50" font-family="'Georgia',serif" font-size="16" fill="#e2e8f0" text-anchor="middle">
        MrHacker (Kevin Munoz)
      </text>
      <rect x="-80" y="58" width="160" height="1" fill="#3b82f6" opacity="0.2"/>
      <text x="0" y="78" font-family="'Segoe UI',sans-serif" font-size="11" fill="#64748b"
            text-anchor="middle" letter-spacing="2">ORGANIZER</text>
    </g>
  </g>

  <!-- Footer -->
  <text x="550" y="730" text-anchor="middle" font-family="'SF Mono',monospace"
        font-size="10" fill="#475569" letter-spacing="1">
    WazuhBOTS v1.0 — Open-Source CTF Platform — Wazuh Technology Ambassador Program
  </text>

  <!-- Verification ID -->
  <text x="550" y="748" text-anchor="middle" font-family="'SF Mono',monospace"
        font-size="9" fill="#374151">
    Certificate ID: WBOTS-478FF407836F
  </text>
</svg>
